    <div>
<h2>Formulario de cadastro de tendencias</h2>
<form oninput="resultadoNota. value= notaEstilo.value">
    <p>
    <label for="nome">Nome Completo</label>
    <input type="text" id="nome" name="nome"placeholder="ex.mc pipinho">
    </p>
    <p>
    <label for="email">E-mail</label><br>
    <input type="email" id="email"name="email"placeholder=nome@provedor.com>
    </p>
    <label for="data-nasc">Data de nascimento:</label><br>
    <input type="date" id="data-nasc"name="data-nacs">
</p>
<label>Quais esportes e lazer vovê prática?(Marque quantos quiser)</label><br>
    <input type="checkbox" id="esp1"name="esportes"value="futebol">
    <label for="esp1">Futebol de Campo / Quadra</label><br></p>
    <input type="checkbox" id="esp2"name="esportes"value="skate">
    <label for="esp2">Skate / Patins</label><br></p>
</p>
<p>
<label for="marca">Qual marca de roupa ou  tênis você gosta?</label><br>
    <input list="marca" id="Marca" name="marca" placeholder="Digite ou selecione...">
    </p>
<datalist id="marca">
<option value="Gucci">
<option value="Nike">
<option value="LV">
</p>
<p>
<label for="instituição">Onde você foca seus estudos atualmente?</label><br>
<select id="Instituição" name="instituição">
    <option value="">Selecione...</option>
    <option value="Universidade">Universidade</option>
    <option value="Faculdade">Faculdade</option>
    <option value="Escola">Escola</option>
</select>
    <p>
        <label for="acessorios">Quais acessórios completam o seu look?</label><br>
        select id="acessórios" name="acessórios" multiple size="6">
    <option value="boné"></option>
    <option value="brinco"></option>
    <option value="óculos"></option>
    <option value="corentes e pulseiras"></option>
    <option value="relógio"></option>

    </select>
    </p>
    <p>
        <label for="notaEstilo">De 0 a 10, o quanto a moda representa a sua identidade?</label><br>
        <input type="range" id="notaEstilo" name="notaEstilo" min="0" max="10" value="5">
        <spam>Nota Selecionada
            <ouput name="resultadoNota" for="notaEstilo">5</ouput>
        </spam>

        <p>
            <button type="submit ">Enviar</button><br>
            <button type="resert">Limpar Foemulário</button>
        </p>
    </p>
</p>

</form>

</div>
